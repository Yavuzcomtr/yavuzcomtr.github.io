  <style>
    :root {
      --bg: #eef3f9;
      --text: #1f2937;
      --muted: #5b6472;
      --accent: #0b57d0;
      --accent-dark: #0f172a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, #f7f9fc 38%, #ffffff 100%);
      color: var(--text);
      line-height: 1.7;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }

    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 36px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      background: linear-gradient(120deg, #eef5ff 0%, #f4fbff 100%);
      border: 1px solid #d6e4f8;
      border-radius: 14px;
      padding: 14px 18px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }

    .brand {
      display: inline-block;
      text-decoration: none;
      font-weight: 700;
      font-size: 20px;
      color: var(--accent-dark);
    }

    .nav-links {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--accent-dark);
      font-size: 20px;
      font-weight: 700;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .section {
      background: linear-gradient(145deg, rgba(95, 161, 100, 0.12) 0%, rgba(95, 161, 100, 0.05) 100%);
      border: 1px solid #d5e9d8;
      border-radius: 18px;
      padding: 28px 24px;
      margin-bottom: 18px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
      position: relative;
      overflow: hidden;
    }

    .section::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      background: #5fa164;
    }

    .section h1 {
      margin: 0 0 14px;
      font-size: 36px;
      color: #0b1f5e;
    }

    .section p {
      margin-top: 0;
      color: #374151;
      font-size: 16px;
    }

    .contact-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid #dbe3ee;
      background: #ffffff;
      color: var(--accent);
    }

    .btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .btn.linkedin {
      color: #0a66c2;
      border-color: #b9d7f3;
      background: #edf5fe;
    }

    .btn.scholar {
      color: #1a73e8;
      border-color: #bfd5fb;
      background: #eef4ff;
    }

    .btn.researchgate {
      color: #00a99d;
      border-color: #afe8e4;
      background: #eaf9f7;
    }

    .btn.orcid {
      color: #a6ce39;
      border-color: #d8ebaa;
      background: #f7fce9;
    }

    .btn:hover {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 12px 0 0;
    }

    @media (max-width: 820px) {
      .section {
        padding: 22px 18px;
      }

      .section h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
